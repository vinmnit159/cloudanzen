<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer eye shape: left arc -->
  <path d="M15 50 Q50 8 85 50" />
  <path d="M85 50 Q50 92 15 50" />

  <!-- Outer corner notches (breaks in the outer shape) -->
  <!-- top-left notch -->
  <line x1="26" y1="24" x2="20" y2="18" />
  <!-- top-right notch -->
  <line x1="74" y1="24" x2="80" y2="18" />
  <!-- bottom-left notch -->
  <line x1="26" y1="76" x2="20" y2="82" />
  <!-- bottom-right notch -->
  <line x1="74" y1="76" x2="80" y2="82" />

  <!-- Inner eye shape -->
  <path d="M25 50 Q50 18 75 50 Q50 82 25 50 Z" />

  <!-- Outer iris ring -->
  <circle cx="50" cy="50" r="16" />

  <!-- Inner C-curl (open arc wrapping around, opening at bottom-left) -->
  <path d="M50 34 Q66 34 66 50 Q66 62 56 67" />

  <!-- Pupil -->
  <circle cx="50" cy="50" r="6.5" />

  <!-- Bottom inner arc detail -->
  <path d="M38 60 Q50 70 62 60" />
</svg>
